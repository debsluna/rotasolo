<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contato — Rota Solo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;500;600&family=Work+Sans:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/estilo.css">
</head>
<body>

<header class="topo">
  <nav class="nav">
    <a href="index.html" class="logo">Rota Solo</a>
    <button class="menu-toggle" id="menuToggle" aria-label="Abrir menu">&#9776;</button>
    <ul class="menu" id="menu">
      <li><a href="index.html">Inicio</a></li>
      <li><a href="destinos.html">Destinos</a></li>
      <li><a href="mapa.html">Mapa</a></li>
      <li><a href="sobre.html">Sobre</a></li>
      <li><a href="contato.html" class="ativo">Contato</a></li>
    </ul>
  </nav>
</header>

<section class="secao container">
  <div class="secao-titulo">
    <h1>Vamos conversar</h1>
    <p>Duvidas, sugestoes de destino ou proposta de parceria — escreva aqui.</p>
  </div>

  <form class="form-contato" action="https://formspree.io/f/SEU_CODIGO_AQUI" method="POST">
    <label for="nome">Nome</label>
    <input type="text" id="nome" name="nome" required>
    <label for="email">E-mail</label>
    <input type="email" id="email" name="email" required>
    <label for="mensagem">Mensagem</label>
    <textarea id="mensagem" name="mensagem" required></textarea>
    <button type="submit" class="botao">Enviar mensagem</button>
  </form>

  <div class="redes-sociais">
    <a href="https://instagram.com/SEU_USUARIO" target="_blank">Instagram</a>
    <a href="mailto:seuemail@exemplo.com">E-mail direto</a>
  </div>
</section>

<footer><p>Rota Solo &mdash; &copy; 2026</p></footer>

<script src="js/dados.js"></script>
<script src="js/principal.js"></script>
<script>
  document.getElementById('menuToggle').addEventListener('click', () => document.getElementById('menu').classList.toggle('aberto'));
</script>
</body>
</html>
